<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Preconnect para fontes (antes do preload) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fontes optimizadas: subset=latin, display=swap, pesos mínimos -->

    />

    <!-- Preload da hero image (LCP crítico) -->
    <link rel="preload" as="image" href="/assets/images/hero-lisbon.webp" type="image/webp" />

    <!-- Title: máx 60 caracteres -->

    <!-- Open Graph -->
    <meta property="og:title" content="ViannaLegal — Cidadania Portuguesa para Brasileiros" />
    <meta property="og:description" content="Mais de 2.000 famílias já têm passaporte europeu. Assessoria completa, 100% online." />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ViannaLegal — Assessoria em Cidadania Portuguesa" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="ViannaLegal" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@viannalegal" />
    <meta name="twitter:title" content="ViannaLegal — Cidadania Portuguesa para Brasileiros" />
    <meta name="twitter:description" content="Mais de 2.000 famílias já têm passaporte europeu. Assessoria completa, 100% online." />

    <!-- Canonical -->
    <link rel="canonical" href="https://viannalegal.com.br/" />

    <!-- Theme color mobile -->
    <meta name="theme-color" content="#0f2d23" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon + PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ═══ ANALYTICS ════════════════════════════════════════════════════════
         Substituir os IDs abaixo pelos valores reais:
         - VITE_GA4_MEASUREMENT_ID  →  G-XXXXXXXXXX  (Google Analytics 4)
         - CLARITY_PROJECT_ID       →  xxxxxxxxxx    (Microsoft Clarity)
         
         Após deploy, adicionar também o domínio ao GA4 e ao Clarity.
    ═══════════════════════════════════════════════════════════════════════ -->

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // Substituir G-PLACEHOLDER pelo Measurement ID real do GA4
      gtag('config', 'G-PLACEHOLDER', {
        anonymize_ip: true,
        cookie_flags: 'SameSite=None;Secure',
        // Respeitar Do Not Track
        send_page_view: !navigator.doNotTrack
      });
    </script>

    <!-- Microsoft Clarity (heatmaps + session recordings — gratuito) -->
    <script>
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "CLARITY-PLACEHOLDER");
      // Substituir CLARITY-PLACEHOLDER pelo Project ID real do Clarity
    </script>


    <!-- ═══ CONVERSION PIXELS ════════════════════════════════════════════════
         Substituir os IDs abaixo pelos valores reais:
         - META_PIXEL_ID     →  ID do Meta Pixel (Facebook/Instagram Ads)
         - GOOGLE_ADS_ID     →  AW-XXXXXXXXX/XXXXXXXXXXXXXX (Google Ads)
         
         Só activar quando houver campanhas pagas activas.
    ═══════════════════════════════════════════════════════════════════════ -->

    <!-- Meta Pixel (Facebook + Instagram Ads) -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // Substituir META-PIXEL-PLACEHOLDER pelo ID real do Meta Pixel
      fbq('init', 'META-PIXEL-PLACEHOLDER');
      fbq('track', 'PageView');
    </script>
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=META-PIXEL-PLACEHOLDER&ev=PageView&noscript=1"
        alt="" />
    </noscript>

    <!-- Google Ads — Conversion Tracking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-PLACEHOLDER"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // Substituir AW-PLACEHOLDER pelo ID real da conta Google Ads
      gtag('config', 'AW-PLACEHOLDER');
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
