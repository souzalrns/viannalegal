[build]
  command = "npm run build"
  publish = "dist"

# Compressão automática pelo Netlify (Brotli + Gzip)
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                     = "DENY"
    X-Content-Type-Options              = "nosniff"
    Strict-Transport-Security           = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy                     = "strict-origin-when-cross-origin"
    Permissions-Policy                  = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy             = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Cache imutável para assets com hash (JS, CSS, imagens geradas pelo Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache agressivo para imagens estáticas
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# HTML nunca em cache (SPA — sempre buscar versão nova)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA redirect — todas as rotas servem index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
